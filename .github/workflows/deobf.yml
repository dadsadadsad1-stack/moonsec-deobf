name: Deobf

on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Original filename'
        required: true

jobs:
  deobf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Lua 5.1
        run: sudo apt-get install -y lua5.1 || true

      - name: Cache luadec binary
        id: cache-luadec
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/luadec
          key: luadec-binary-v1

      - name: Install Rust and build luadec
        if: steps.cache-luadec.outputs.cache-hit != 'true'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y || true
          source $HOME/.cargo/env || true
          git clone https://github.com/ItsLucas/luadec.git || true
          cd luadec && cargo build --release || true
          cp target/release/luadec /usr/local/bin/luadec || true

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v4
        with:
          path: ./out
          key: build-${{ hashFiles('**/*.cs', '**/*.csproj') }}

      - name: Build
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: dotnet publish MoonsecDeobfuscator.csproj -c Release -o ./out

      - name: Download unluac
        run: |
          wget -q "https://sourceforge.net/projects/unluac/files/Unstable/unluac_2025_10_20.jar/download" -O unluac.jar --content-disposition || true
          echo "unluac.jar size: $(wc -c < unluac.jar 2>/dev/null || echo 0) bytes"

      - name: Deobfuscate
        shell: bash
        run: |
          source $HOME/.cargo/env || true
          set +e

          # Step 1 - devirtualize
          dotnet ./out/MoonsecDeobfuscator.dll -dev -i input.lua -o devirt.lua 2>deobf_err.txt
          cat deobf_err.txt || true
          echo "devirt.lua size: $(wc -c < devirt.lua 2>/dev/null || echo 0) bytes"

          # Step 2 - pick best input for decompiler
          if [ -f devirt.lua ] && [ -s devirt.lua ]; then
            DECOMPILE_INPUT="devirt.lua"
          else
            echo "devirt.lua empty or missing, using raw input"
            DECOMPILE_INPUT="input.lua"
          fi

          # Step 3 - try luadec
          echo "trying luadec..."
          luadec "$DECOMPILE_INPUT" > result.lua 2>luadec_err.txt
          LUADEC_EXIT=$?
          cat luadec_err.txt || true

          # Step 4 - try unluac if luadec failed
          if [ $LUADEC_EXIT -ne 0 ] || [ ! -s result.lua ]; then
            echo "luadec failed (exit $LUADEC_EXIT), trying unluac..."
            timeout 120 java -jar unluac.jar "$DECOMPILE_INPUT" > result.lua 2>unluac_err.txt
            UNLUAC_EXIT=$?
            cat unluac_err.txt || true

            # Step 5 - fallback to devirt output
            if [ $UNLUAC_EXIT -ne 0 ] || [ ! -s result.lua ]; then
              echo "unluac failed, using best available output"
              cp "$DECOMPILE_INPUT" result.lua
            else
              echo "unluac succeeded"
            fi
          else
            echo "luadec succeeded"
          fi

          # Step 6 - absolute last resort
          if [ ! -f result.lua ] || [ ! -s result.lua ]; then
            echo "all methods failed, copying original input"
            cp input.lua result.lua
          fi

          echo "final result.lua size: $(wc -c < result.lua 2>/dev/null || echo 0) bytes"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.lua
          retention-days: 1
