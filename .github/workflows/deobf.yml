name: Deobf

on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Original filename'
        required: true

jobs:
  deobf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v4
        with:
          path: ./out
          key: build-${{ hashFiles('**/*.cs', '**/*.csproj') }}

      - name: Build
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: dotnet publish MoonsecDeobfuscator.csproj -c Release -o ./out

      - name: Deobfuscate
        run: |
          dotnet ./out/MoonsecDeobfuscator.dll -dev -i input.lua -o devirt.lua
          echo "devirt.lua size: $(wc -c < devirt.lua) bytes"
          timeout 120 java -jar unluac.jar devirt.lua > result.lua 2>unluac_err.txt
          EXIT=$?
          if [ $EXIT -ne 0 ]; then
            echo "unluac failed with code $EXIT"
            cat unluac_err.txt
            cp devirt.lua result.lua
          else
            echo "unluac succeeded"
          fi

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.lua
          retention-days: 1
