name: Deobf

on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Original filename'
        required: true

jobs:
  deobf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v4
        with:
          path: ./out
          key: build-${{ hashFiles('**/*.cs', '**/*.csproj') }}

      - name: Build
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: dotnet publish MoonsecDeobfuscator.csproj -c Release -o ./out

      - name: Check input
        run: |
          echo "input.lua size: $(wc -c < input.lua 2>/dev/null || echo 0) bytes"
          file input.lua || true

      - name: Deobfuscate (MoonsecDeobfuscator)
        shell: bash
        run: |
          set +e
          dotnet ./out/MoonsecDeobfuscator.dll -dev -i input.lua -o devirt.lua 2>deobf_err.txt
          cat deobf_err.txt || true
          echo "devirt.lua size: $(wc -c < devirt.lua 2>/dev/null || echo 0) bytes"
          if [ -f devirt.lua ] && [ -s devirt.lua ]; then
            echo "DECOMPILE_INPUT=devirt.lua" >> $GITHUB_ENV
          else
            echo "devirt.lua empty, using raw input"
            echo "DECOMPILE_INPUT=input.lua" >> $GITHUB_ENV
          fi

      - name: Decompile (Oracle)
        shell: bash
        env:
          ORACLE_KEY: 019dc9bf-29b1-76ed-ba40-eb51b9aac47d
        run: |
          set +e
          echo "trying Oracle decompiler on $DECOMPILE_INPUT..."
          ENCODED=$(base64 -w 0 "$DECOMPILE_INPUT")
          PAYLOAD=$(python3 -c "
          import json, sys
          print(json.dumps({
              'script': '${ENCODED}',
              'decompilerOptions': {
                  'renamingType': 'UNIQUE_VALUE_BASED',
                  'removeDotZero': True,
                  'sugarGenericFor': True,
                  'sugarLocalFunctions': True,
                  'sugarGlobalFunctions': True,
                  'removeUselessReturnInFunction': True,
                  'removeUselessNumericForStep': True
              }
          }))
          ")
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ORACLE_KEY" \
            -d "$PAYLOAD" \
            "https://oracle.mshq.dev/decompile")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Oracle response code: $HTTP_CODE"
          echo "Oracle response preview: ${BODY:0:200}"
          if [ "$HTTP_CODE" = "200" ] && [ -n "$BODY" ]; then
            echo "$BODY" > result.lua
            echo "Oracle decompile succeeded, size: $(wc -c < result.lua) bytes"
          else
            echo "Oracle failed, falling back to devirt output"
            if [ -f devirt.lua ] && [ -s devirt.lua ]; then
              cp devirt.lua result.lua
            else
              cp input.lua result.lua
            fi
          fi
          echo "final result.lua size: $(wc -c < result.lua 2>/dev/null || echo 0) bytes"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.lua
          retention-days: 1
