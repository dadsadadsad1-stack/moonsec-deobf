name: Deobf

on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Original filename'
        required: true

jobs:
  deobf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Lua 5.1
        run: sudo apt-get install -y lua5.1

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v4
        with:
          path: ./out
          key: build-${{ hashFiles('**/*.cs', '**/*.csproj') }}

      - name: Build
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: dotnet publish MoonsecDeobfuscator.csproj -c Release -o ./out

      - name: Download better unluac
        run: |
          wget -q https://github.com/Jeong-Min-Cho/unluac/releases/latest/download/unluac.jar -O unluac_new.jar || true
          if [ -f unluac_new.jar ] && [ -s unluac_new.jar ]; then
            mv unluac_new.jar unluac.jar
            echo "using newer unluac"
          else
            echo "using bundled unluac"
          fi

      - name: Deobfuscate
        run: |
          dotnet ./out/MoonsecDeobfuscator.dll -dev -i input.lua -o devirt.lua 2>deobf_err.txt || true
          cat deobf_err.txt || true
          echo "devirt.lua size: $(wc -c < devirt.lua 2>/dev/null || echo 0) bytes"
          if [ -f devirt.lua ] && [ -s devirt.lua ]; then
            timeout 120 java -jar unluac.jar devirt.lua > result.lua 2>unluac_err.txt
            if [ $? -ne 0 ] || [ ! -s result.lua ]; then
              echo "unluac failed, using devirt output directly"
              cat unluac_err.txt || true
              cp devirt.lua result.lua
            else
              echo "unluac succeeded"
            fi
          else
            echo "devirt.lua empty, copying input as result"
            cp input.lua result.lua
          fi
          echo "result.lua size: $(wc -c < result.lua) bytes"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.lua
          retention-days: 1
