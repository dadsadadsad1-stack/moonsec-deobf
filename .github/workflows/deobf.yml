name: Deobf

on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Original filename'
        required: true

jobs:
  deobf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Lua 5.1
        run: sudo apt-get install -y lua5.1

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v4
        with:
          path: ./out
          key: build-${{ hashFiles('**/*.cs', '**/*.csproj') }}

      - name: Build
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: dotnet publish MoonsecDeobfuscator.csproj -c Release -o ./out

      - name: Deobfuscate
        run: |
          dotnet ./out/MoonsecDeobfuscator.dll -dev -i input.lua -o devirt.lua 2>deobf_err.txt || true
          cat deobf_err.txt || true
          echo "devirt.lua size: $(wc -c < devirt.lua 2>/dev/null || echo 0) bytes"
          if [ -f devirt.lua ] && [ -s devirt.lua ]; then
            luac5.1 -o devirt.luac devirt.lua 2>luac_err.txt || true
            if [ -f devirt.luac ] && [ -s devirt.luac ]; then
              echo "luac succeeded, running unluac on bytecode"
              timeout 120 java -jar unluac.jar devirt.luac > result.lua 2>unluac_err.txt || cp devirt.lua result.lua
            else
              echo "luac failed, trying unluac directly"
              cat luac_err.txt || true
              timeout 120 java -jar unluac.jar devirt.lua > result.lua 2>unluac_err.txt || cp devirt.lua result.lua
            fi
            cat unluac_err.txt || true
          else
            echo "devirt.lua empty, copying input as result"
            cp input.lua result.lua
          fi
          echo "result.lua size: $(wc -c < result.lua) bytes"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.lua
          retention-days: 1
